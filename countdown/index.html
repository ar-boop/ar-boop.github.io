<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.gstatic.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap"
			rel="stylesheet"
		/>

		<link rel="shortcut icon" href="birthday-cake.svg" />
		<link rel="stylesheet" href="style.css" />
		<title>Countdown</title>
	</head>
	<body>
		<section class="coming-soon">
			<div>
				<h2>Your next birthday in !</h2>
				<div class="countdown">
					<div class="container-day">
						<h3 class="days">Time</h3>
						<h3>days</h3>
					</div>
					<div class="container-hour">
						<h3 class="hours">Time</h3>
						<h3>hours</h3>
					</div>
					<div class="container-mins">
						<h3 class="mins">Time</h3>
						<h3>mins</h3>
					</div>
					<div class="container-secs">
						<h3 class="secs">Time</h3>
						<h3>secs</h3>
					</div>
				</div>
			</div>
			<img src="Management.svg" alt="" class="waiting" />
		</section>
		<script src="app.js"></script>
	</body>
</html>
